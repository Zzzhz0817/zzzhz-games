<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sisyphus: The Eternal Climb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-gold: #FFD740;
      --primary-blue: #2962FF;
      --success-green: #00E676;
      --fail-red: #FF5252;
      --bg-dark: rgba(20, 20, 30, 0.85);
      --text-light: #ECEFF1;
      --font-title: 'Cinzel', serif;
      --font-body: 'Lato', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e; /* Fallback */
      font-family: var(--font-body);
      user-select: none;
      color: var(--text-light);
      touch-action: none;
      -webkit-touch-callout: none;
    }

    /* Force landscape on mobile via CSS rotation when in portrait */
    @media screen and (orientation: portrait) and (max-width: 900px) {
      html {
        transform: rotate(90deg);
        transform-origin: top left;
        width: 100vh;
        height: 100vw;
        position: absolute;
        top: 0;
        left: 100vw;
        overflow: hidden;
      }
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* --- HUD --- */
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .hud-panel {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
      padding: 10px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      gap: 20px;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .currency-display {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
    }

    .currency-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Obol (Silver coin with skull) */
    .currency-icon.obol { 
      background: #e0e0e0;
      border-radius: 50%;
      border: 2px solid #FAFAFA;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), 0 0 0 1px #455A64;
      position: relative;
    }
    .currency-icon.obol::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      /* Using a combination of borders and background to make a cute skull */
      background: #9E9E9E;
      border-radius: 5px 5px 2px 2px;
      /* Eyes */
      background-image: 
        radial-gradient(circle at 3px 4px, #e0e0e0 1.5px, transparent 1.5px),
        radial-gradient(circle at 7px 4px, #e0e0e0 1.5px, transparent 1.5px);
      box-sizing: border-box;
    }
    .currency-icon.obol::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #9E9E9E;
      z-index: 1;
    }
    /* Adding teeth via another pseudo element isn't possible directly since we used both, 
       so we'll just use a linear gradient on the after element for teeth */
    .currency-icon.obol::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: #9E9E9E;
      border-radius: 5px 5px 2px 2px;
      background-image: 
        /* Eyes */
        radial-gradient(circle at 3px 4px, #e0e0e0 1.5px, transparent 1.5px),
        radial-gradient(circle at 7px 4px, #e0e0e0 1.5px, transparent 1.5px),
        /* Teeth */
        linear-gradient(to right, transparent 2px, #e0e0e0 2px, #e0e0e0 3px, transparent 3px, transparent 5px, #e0e0e0 5px, #e0e0e0 6px, transparent 6px, transparent 8px, #e0e0e0 8px, #e0e0e0 9px, transparent 9px);
      background-size: 10px 10px, 10px 10px, 10px 3px;
      background-position: 0 0, 0 0, 0 7px;
      background-repeat: no-repeat;
      box-sizing: border-box;
    }

    /* Ingot (Gold trapezoid) */
    .currency-icon.ingot { 
      width: 28px;
      height: 20px;
      background: linear-gradient(to bottom, #FFD54F 0%, #FFCA28 40%, #FF8F00 100%);
      clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
      position: relative;
      color: transparent;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
    }
    .currency-icon.ingot::before { 
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%; height: 4px;
      background: rgba(255, 255, 255, 0.6);
      clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
    }
    .currency-icon.ingot::after {
      content: 'Ω';
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -40%);
      font-size: 10px; color: #B15D00; font-weight: bold;
      font-family: 'Cinzel', serif;
      text-shadow: 0 1px 0 rgba(255,255,255,0.3);
    }

    #hud-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    #hud-height {
      font-family: var(--font-title);
      font-size: 24px;
      color: var(--primary-gold);
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    /* Mobile overrides */
    html.mobile #hud-height,
    html.mobile #hud-mountain-name {
      color: var(--primary-blue) !important;
    }
    html.mobile #tutorial-hint {
      color: var(--primary-blue);
    }
    html.mobile #tutorial-hint.show {
      color: var(--primary-blue);
    }
    @keyframes hint-pulse-mobile {
      0%, 100% { text-shadow: 0 0 8px rgba(41,98,255,0.3), 0 4px 10px rgba(0,0,0,0.6); }
      50%       { text-shadow: 0 0 22px rgba(41,98,255,0.95), 0 0 40px rgba(41,98,255,0.5), 0 4px 10px rgba(0,0,0,0.6); }
    }
    html.mobile #tutorial-hint {
      animation: hint-pulse-mobile 2s ease-in-out infinite;
    }

    #hud-best {
      font-size: 14px;
      color: #aaa;
    }

    /* --- Judgment Bar --- */
    #judgment-bar-container {
      position: absolute;
      display: none;
      z-index: 20;
      pointer-events: none;
      /* Centered above player handled by JS, but we style the bar itself */
    }

    #judgment-bar {
      position: relative;
      height: 24px; /* Matches config */
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #555;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    #judgment-bar-fail-bg {
      width: 100%;
      height: 100%;
      position: absolute;
      background: var(--fail-red);
      opacity: 0.3;
    }

    #judgment-bar-success {
      position: absolute;
      top: 0;
      height: 100%;
      background: var(--success-green);
      box-shadow: 0 0 15px var(--success-green);
      z-index: 2;
    }

    #judgment-bar-crit {
      position: absolute;
      top: 0;
      height: 100%;
      background: #FFF;
      opacity: 0.8;
      z-index: 3;
      display: none;
    }

    #judgment-bar-pointer {
      position: absolute;
      top: -4px;
      width: 4px;
      height: 32px;
      background: var(--primary-gold);
      border: 1px solid #FFF;
      box-shadow: 0 0 5px var(--primary-gold);
      z-index: 10;
      transform: translateX(-50%);
    }

    /* --- Notifications --- */
    #checkpoint-notification {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-title);
      color: var(--primary-gold);
      font-size: 48px;
      font-weight: 700;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
      opacity: 0;
      z-index: 30;
      pointer-events: none;
      transition: opacity 0.5s, transform 0.5s;
    }
    
    #checkpoint-notification.show {
      opacity: 1;
      transform: translate(-50%, -60%);
    }

    /* --- Tutorial hint --- */
    #tutorial-hint {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-title);
      color: var(--primary-gold);
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      z-index: 30;
      pointer-events: none;
      transition: opacity 0.8s;
      animation: hint-pulse 2s ease-in-out infinite;
    }
    #tutorial-hint.show {
      opacity: 1;
    }
    @keyframes hint-pulse {
      0%, 100% { text-shadow: 0 0 8px rgba(255,215,64,0.3), 0 4px 10px rgba(0,0,0,0.6); }
      50%       { text-shadow: 0 0 22px rgba(255,215,64,0.95), 0 0 40px rgba(255,215,64,0.5), 0 4px 10px rgba(0,0,0,0.6); }
    }

    /* --- Shop --- */
    #shop-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      display: none;
      z-index: 50;
      overflow-y: auto;
      font-family: var(--font-body);
    }

    #shop-content {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    #shop-content h1 {
      font-family: var(--font-title);
      text-align: center;
      font-size: 42px;
      color: var(--primary-gold);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #shop-stats {
      text-align: center;
      color: #aaa;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .shop-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .shop-section h2 {
      font-family: var(--font-title);
      font-size: 24px;
      color: var(--text-light);
      margin-bottom: 20px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }

    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .artifact-grid {
      display: flex;
      justify-content: space-around;
      gap: 20px;
      padding: 60px 20px 30px;
      position: relative;
      background: linear-gradient(to bottom, rgba(10,10,15,0) 0%, rgba(20,20,30,0.8) 100%);
      border-radius: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      margin-top: 10px;
    }

    .artifact-pedestal {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      cursor: pointer;
      z-index: 1;
    }

    .artifact-icon-container {
      height: 110px;
      width: 100px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 15px;
      transition: all 0.3s ease;
      z-index: 2;
    }

    /* The physical stone pedestal base */
    .artifact-icon-container::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 24px;
      background: radial-gradient(ellipse at top, #3a3a4a, #1a1a25);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      box-shadow: 0 15px 25px rgba(0,0,0,0.9);
      z-index: -2;
      transition: all 0.3s ease;
    }

    /* The mystical light beam */
    .artifact-icon-container::after {
      content: '';
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 80px;
      background: linear-gradient(to top, rgba(255,255,255,0.05), transparent);
      border-radius: 50% 50% 0 0;
      z-index: -1;
      opacity: 0;
      transition: all 0.5s ease;
      pointer-events: none;
    }

    .artifact-pedestal:hover:not(.unavailable) .artifact-icon-container {
      transform: scale(1.1);
    }

    /* Tooltip */
    .artifact-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      width: 220px;
      background: rgba(15, 15, 25, 0.95);
      border: 1px solid var(--primary-gold);
      padding: 16px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
      text-align: center;
      z-index: 10;
      box-shadow: 0 10px 20px rgba(0,0,0,0.8);
    }

    .artifact-pedestal:hover .artifact-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    .artifact-name {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--primary-gold);
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      text-align: center;
    }

    .artifact-desc {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .artifact-cost {
      font-weight: 700;
      color: var(--primary-gold);
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    /* --- Artifact CSS Icons --- */
    .art-icon {
      position: relative;
      transition: all 0.3s ease;
      z-index: 10;
      margin-bottom: 20px; /* Lift off the pedestal */
    }

    /* Ares' Fury: Red Sword/Crystal */
    .art-ares {
      width: 24px; height: 60px;
      background: linear-gradient(to right, #b71c1c 50%, #d32f2f 50%);
      clip-path: polygon(50% 0%, 100% 25%, 50% 100%, 0% 25%);
    }

    /* Heracles' Armlet: Golden Bracer/Gauntlet */
    .art-heracles {
      width: 32px; height: 50px;
      background: linear-gradient(to right, #FF8F00 0%, #FFD54F 30%, #FFCA28 70%, #FF8F00 100%);
      border-radius: 6px 6px 12px 12px;
      box-shadow: inset 0 -4px 10px rgba(0,0,0,0.6);
    }
    .art-heracles::before {
      content: ''; position: absolute;
      top: 12px; left: -2px; right: -2px; height: 3px;
      background: #FFF8E1; border-radius: 2px;
      box-shadow: 0 20px 0 0 #FFF8E1; /* Second band */
    }

    /* Hephaestus' Wedge: Iron Anvil */
    .art-hephaestus {
      width: 44px; height: 36px;
      background: linear-gradient(to right, #37474F 50%, #455A64 50%);
      clip-path: polygon(0% 0%, 100% 0%, 75% 100%, 25% 100%);
    }
    .art-hephaestus::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 8px;
      background: #90A4AE;
    }

    /* Wheel of Fate: Mystic Astrolabe */
    .art-wheel {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: 
        linear-gradient(0deg, transparent 46%, rgba(179,157,219,0.8) 46%, rgba(179,157,219,0.8) 54%, transparent 54%),
        linear-gradient(90deg, transparent 46%, rgba(179,157,219,0.8) 46%, rgba(179,157,219,0.8) 54%, transparent 54%),
        conic-gradient(from 0deg, #4527A0, #211261, #4527A0, #211261, #4527A0);
      display: flex; justify-content: center; align-items: center;
      border: 3px solid #311B92;
      box-shadow: inset 0 0 10px #000;
    }
    .art-wheel::after {
      content: ''; width: 12px; height: 12px;
      background: #D1C4E9; border-radius: 50%;
      box-shadow: 0 0 8px #FFF;
    }

    /* Artifact States */
    .artifact-pedestal.unavailable .art-icon {
      filter: grayscale(1) brightness(0.3);
    }
    
    .artifact-pedestal.crafted .artifact-icon-container::after {
      opacity: 0.5; /* Faint light beam when crafted */
    }
    .artifact-pedestal.crafted .art-icon {
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
    }
    
    .artifact-pedestal.equipped .art-icon {
      animation: float 3s ease-in-out infinite;
    }
    
    /* Specific Glows and Beams for Equipped State */
    .artifact-pedestal.equipped:nth-child(1) .art-icon { filter: drop-shadow(0 0 15px #ff5252) brightness(1.2); }
    .artifact-pedestal.equipped:nth-child(1) .artifact-icon-container::after {
      opacity: 1; height: 130px; filter: blur(3px);
      background: linear-gradient(to top, rgba(255, 82, 82, 0.3), transparent);
    }
    
    .artifact-pedestal.equipped:nth-child(2) .art-icon { filter: drop-shadow(0 0 15px #FFD740) brightness(1.2); }
    .artifact-pedestal.equipped:nth-child(2) .artifact-icon-container::after {
      opacity: 1; height: 130px; filter: blur(3px);
      background: linear-gradient(to top, rgba(255, 215, 64, 0.3), transparent);
    }
    
    .artifact-pedestal.equipped:nth-child(3) .art-icon { filter: drop-shadow(0 0 15px #00E5FF) brightness(1.2); }
    .artifact-pedestal.equipped:nth-child(3) .artifact-icon-container::after {
      opacity: 1; height: 130px; filter: blur(3px);
      background: linear-gradient(to top, rgba(0, 229, 255, 0.2), transparent);
    }
    
    .artifact-pedestal.equipped:nth-child(4) .art-icon { filter: drop-shadow(0 0 15px #B39DDB) brightness(1.2); }
    .artifact-pedestal.equipped:nth-child(4) .artifact-icon-container::after {
      opacity: 1; height: 130px; filter: blur(3px);
      background: linear-gradient(to top, rgba(179, 157, 219, 0.3), transparent);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .upgrade-card {
      background: linear-gradient(to bottom, rgba(40, 40, 50, 0.95), rgba(20, 20, 30, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 340px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    /* Pillar fluting texture */
    .upgrade-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 10%,
        rgba(0, 0, 0, 0.15) 10%,
        rgba(0, 0, 0, 0.15) 20%
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Pillar parts */
    .pillar-top {
      padding: 15px;
      height: 96px; /* Fixed height to align all pillars */
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.5);
      border-bottom: 2px solid rgba(255, 215, 64, 0.15);
      text-align: center;
      z-index: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .pillar-mid {
      padding: 24px 16px;
      flex-grow: 1;
      text-align: center;
      z-index: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .pillar-bottom {
      padding: 16px;
      background: rgba(0, 0, 0, 0.7);
      text-align: center;
      z-index: 1;
      position: relative;
    }

    .upgrade-card:hover:not(.locked):not(.maxed) {
      transform: translateY(-8px);
      border-color: var(--primary-gold);
      box-shadow: 0 15px 30px rgba(255, 215, 64, 0.15), inset 0 0 0 1px rgba(255, 215, 64, 0.5);
    }

    .upgrade-card.locked {
      opacity: 0.5;
      filter: grayscale(1);
      cursor: not-allowed;
    }

    .upgrade-card.maxed {
      border-color: rgba(0, 230, 118, 0.3);
      cursor: default;
    }

    .upgrade-name {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 6px;
      color: var(--primary-gold);
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      line-height: 1.2;
    }

    .upgrade-level {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .upgrade-desc {
      font-size: 14px;
      color: #ddd;
      line-height: 1.5;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    .upgrade-progress-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(0,0,0,0.6);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .upgrade-progress-fill {
      height: 100%;
      background: var(--primary-gold);
      box-shadow: 0 0 8px var(--primary-gold), 0 0 4px #fff;
      transition: width 0.3s ease;
    }

    .upgrade-cost {
      font-weight: 700;
      color: #fff;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* --- Mountain Journey --- */
    .mountain-track {
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      position: relative;
      padding: 0 20px 20px;
      margin-top: 20px;
    }

    /* The glowing ground line */
    .mountain-track::after {
      content: '';
      position: absolute;
      top: 180px;
      left: 5%;
      right: 5%;
      height: 3px;
